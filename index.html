<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="style.js"defer></script>
    <title>Quiz game</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz Time</h1>
            <p>Text your knowledge with these fun questions</p>
            <button class="btn" id="start-btn">START QUIZ</button>
        </div>


        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
               <h2  id="question-text">Question goes here</h2>
            <div class="quiz-info">
               <p>question: <span id="current-question">1</span> of <span  id="total-questions">5</span></p>
               <p>Score: <span id="score">0</span></p>
            </div>
        </div>


            <div class="answers-container" id="answers-container"> 
                <!-- Answer buttons  will be inserted here from our java script code later at some point-->
            </div>


            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
              

            <div class="screen" id="result-screen">
                <h1>Quiz Result</h1>
                <div class="result-info" id="result-info" >
                    
                      <p>  You Scored <span id="final-score"> 0 </span> out of <span id="max-score">5</span> </p>
                     <div id="result-message">Good Job!</div>
                </div>
                <button id="restart-btn">RE-Start Quiz</button>
            </div>
        </div>
    </div>
</body>
</html>
